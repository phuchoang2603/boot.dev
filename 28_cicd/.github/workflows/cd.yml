on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      # Set up tools
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - id: auth
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS }}"

      - name: Set up Cloud SDK
        uses: "google-github-actions/setup-gcloud@v3"

      # Build app, push to registry, run migration, and deploy to Cloud Run
      - name: Build Go application
        run: ./scripts/buildprod.sh

      - name: Build to artifacts registry
        run: gcloud builds submit --tag ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_IMAGE }}:latest .

      - name: Run database migration
        run: ./scripts/migrateup.sh

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy notely \
            --image ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_IMAGE }}:latest \
            --region ${{ vars.GCP_REGION }} \
            --allow-unauthenticated \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --max-instances=4
